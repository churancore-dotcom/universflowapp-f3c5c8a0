name: Build Android APK

on:
  workflow_dispatch:  # Manual trigger from GitHub
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: |
          # Hard-guarantee the Supabase env vars are present at build time.
          # If the GH secret is empty/unset, fall back to the committed .env
          # values (anon key is public — safe to bake into the APK). Without
          # this, the workflow `env:` block injects empty strings which silently
          # override .env and the Supabase client crashes on init → black APK.
          export VITE_SUPABASE_URL="${VITE_SUPABASE_URL:-$(grep '^VITE_SUPABASE_URL=' .env | cut -d= -f2- | tr -d '"')}"
          export VITE_SUPABASE_PUBLISHABLE_KEY="${VITE_SUPABASE_PUBLISHABLE_KEY:-$(grep '^VITE_SUPABASE_PUBLISHABLE_KEY=' .env | cut -d= -f2- | tr -d '"')}"
          export VITE_SUPABASE_PROJECT_ID="${VITE_SUPABASE_PROJECT_ID:-$(grep '^VITE_SUPABASE_PROJECT_ID=' .env | cut -d= -f2- | tr -d '"')}"
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_PUBLISHABLE_KEY" ]; then
            echo "::error::Supabase env missing — APK would black-screen. Aborting build."
            exit 1
          fi
          echo "VITE_SUPABASE_URL length=${#VITE_SUPABASE_URL}"
          echo "VITE_SUPABASE_PUBLISHABLE_KEY length=${#VITE_SUPABASE_PUBLISHABLE_KEY}"
          npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Use production Capacitor config
        run: |
          cp capacitor.config.prod.ts capacitor.config.ts

      - name: Add Android platform
        run: npx cap add android

      - name: Install google-services.json (Firebase / FCM)
        run: |
          cp android-config/google-services.json android/app/google-services.json
          echo "google-services.json installed:"
          ls -la android/app/google-services.json

      - name: Wire Firebase Gradle plugin
        run: |
          # 1) Add google-services classpath to project-level build.gradle
          PROJECT_GRADLE="android/build.gradle"
          if ! grep -q "com.google.gms:google-services" "$PROJECT_GRADLE"; then
            sed -i "s|classpath 'com.android.tools.build:gradle.*|&\n        classpath 'com.google.gms:google-services:4.4.2'|" "$PROJECT_GRADLE"
          fi

          # 2) Apply google-services plugin at the BOTTOM of app-level build.gradle
          APP_GRADLE="android/app/build.gradle"
          if ! grep -q "com.google.gms.google-services" "$APP_GRADLE"; then
            echo "" >> "$APP_GRADLE"
            echo "apply plugin: 'com.google.gms.google-services'" >> "$APP_GRADLE"
          fi

          # 3) Add Firebase Messaging dependency
          if ! grep -q "firebase-messaging" "$APP_GRADLE"; then
            sed -i "s|dependencies {|dependencies {\n    implementation platform('com.google.firebase:firebase-bom:33.5.1')\n    implementation 'com.google.firebase:firebase-messaging'|" "$APP_GRADLE"
          fi

          echo "=== project build.gradle ==="
          grep -n "google-services\|firebase" "$PROJECT_GRADLE" || true
          echo "=== app build.gradle ==="
          grep -n "google-services\|firebase" "$APP_GRADLE" || true

      - name: Write MainActivity (registers MediaNotificationPlugin)
        run: |
          PKG="app.lovable.id5acaae55bbc847a7bd32f3924d8ef986"
          PKG_PATH="app/lovable/id5acaae55bbc847a7bd32f3924d8ef986"
          MAIN_ACTIVITY="android/app/src/main/java/${PKG_PATH}/MainActivity.java"

          mkdir -p "$(dirname "$MAIN_ACTIVITY")"
          cat > "$MAIN_ACTIVITY" <<EOF
          package ${PKG};

          import android.os.Bundle;
          import com.getcapacitor.BridgeActivity;
          import ${PKG}.media.MediaNotificationPlugin;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  registerPlugin(MediaNotificationPlugin.class);
                  super.onCreate(savedInstanceState);
              }
          }
          EOF

          echo "MainActivity registered at: $MAIN_ACTIVITY"


      - name: Integrate MediaNotification plugin (lockscreen + notification controls)
        run: |
          PKG="app.lovable.id5acaae55bbc847a7bd32f3924d8ef986"
          PKG_PATH="app/lovable/id5acaae55bbc847a7bd32f3924d8ef986"

          # Copy plugin sources, rewriting the placeholder package to the real one
          mkdir -p "android/app/src/main/java/${PKG_PATH}/media"
          for f in android-native/java/*.java; do
            base=$(basename "$f")
            sed "s|PACKAGE_PLACEHOLDER|${PKG}|g" "$f" \
              > "android/app/src/main/java/${PKG_PATH}/media/${base}"
          done

          MANIFEST="android/app/src/main/AndroidManifest.xml"

          # Add required permissions (idempotent)
          add_perm() {
            local PERM="$1"
            if ! grep -q "android.permission.${PERM}" "$MANIFEST"; then
              sed -i "s|<application|<uses-permission android:name=\"android.permission.${PERM}\" />\n    <application|" "$MANIFEST"
            fi
          }
          add_perm "POST_NOTIFICATIONS"
          add_perm "FOREGROUND_SERVICE"
          add_perm "FOREGROUND_SERVICE_MEDIA_PLAYBACK"
          add_perm "WAKE_LOCK"
          add_perm "MEDIA_CONTENT_CONTROL"

          # Register the foreground service before </application>
          if ! grep -q "MediaNotificationService" "$MANIFEST"; then
            sed -i 's|</application>|    <service android:name=".media.MediaNotificationService" android:exported="false" android:foregroundServiceType="mediaPlayback" />\n        <receiver android:name="androidx.media.session.MediaButtonReceiver" android:exported="true">\n            <intent-filter>\n                <action android:name="android.intent.action.MEDIA_BUTTON" />\n            </intent-filter>\n        </receiver>\n    </application>|' "$MANIFEST"
          fi

          # Add androidx.media dependency to app build.gradle
          APP_GRADLE="android/app/build.gradle"
          if ! grep -q "androidx.media:media" "$APP_GRADLE"; then
            sed -i "s|dependencies {|dependencies {\n    implementation 'androidx.media:media:1.7.0'|" "$APP_GRADLE"
          fi

          echo "=== Manifest perms / service ==="
          grep -nE "POST_NOTIFICATIONS|FOREGROUND_SERVICE|MediaNotificationService|MediaButtonReceiver" "$MANIFEST" || true
          echo "=== Plugin files ==="
          ls -la "android/app/src/main/java/${PKG_PATH}/media/"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Apply custom app launcher icon (Universflow logo)
        run: |
          ICON="android-config/app-icon.png"
          if [ -f "$ICON" ]; then
            for d in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
              DIR="android/app/src/main/res/$d"
              mkdir -p "$DIR"
              cp "$ICON" "$DIR/ic_launcher.png"
              cp "$ICON" "$DIR/ic_launcher_round.png"
              cp "$ICON" "$DIR/ic_launcher_foreground.png"
            done
            # Remove any adaptive-icon XMLs so the raw PNG is used directly
            # (no zoom / no inset clipping by the system).
            rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml \
                  android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml || true
            echo "Custom launcher icon applied (raw, no adaptive crop)."
          else
            echo "No custom icon found, using Capacitor default."
          fi

      - name: Install notification status-bar icon (white silhouette)
        run: |
          declare -A SIZES=( [mdpi]=24 [hdpi]=36 [xhdpi]=48 [xxhdpi]=72 [xxxhdpi]=96 )
          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            SRC="android-config/notif-${d}.png"
            DIR="android/app/src/main/res/drawable-${d}"
            mkdir -p "$DIR"
            if [ -f "$SRC" ]; then
              cp "$SRC" "$DIR/ic_stat_notify.png"
            fi
          done

          # Tell FCM to use this icon for incoming push notifications,
          # plus an accent color so Android tints it correctly.
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "default_notification_icon" "$MANIFEST"; then
            sed -i 's|</application>|    <meta-data android:name="com.google.firebase.messaging.default_notification_icon" android:resource="@drawable/ic_stat_notify" />\n        <meta-data android:name="com.google.firebase.messaging.default_notification_color" android:resource="@color/notification_color" />\n    </application>|' "$MANIFEST"
          fi

          # Define the accent color resource
          COLORS="android/app/src/main/res/values/colors.xml"
          mkdir -p "$(dirname "$COLORS")"
          if [ ! -f "$COLORS" ]; then
            echo '<?xml version="1.0" encoding="utf-8"?><resources></resources>' > "$COLORS"
          fi
          if ! grep -q "notification_color" "$COLORS"; then
            sed -i 's|</resources>|    <color name="notification_color">#FF2D55</color>\n</resources>|' "$COLORS"
          fi
          echo "Notification icon installed."


      - name: Configure APK (universal ABI, no splits, debug unminified)
        run: |
          APP_GRADLE="android/app/build.gradle"

          # Single universal APK that runs on every Android device
          # (armv7 = old phones, arm64 = modern phones, x86/x86_64 = emulators).
          if ! grep -q "ndk {" "$APP_GRADLE"; then
            sed -i "s|defaultConfig {|defaultConfig {\n        ndk {\n            abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'\n        }|" "$APP_GRADLE"
          fi

          # Never produce per-ABI / per-density slices.
          if ! grep -q "splits {" "$APP_GRADLE"; then
            sed -i "s|android {|android {\n    splits {\n        abi { enable false }\n        density { enable false }\n    }|" "$APP_GRADLE"
          fi

          # Debug build = unminified so stack traces are readable.
          if ! grep -q "buildTypes {" "$APP_GRADLE"; then
            sed -i "s|android {|android {\n    buildTypes {\n        debug {\n            minifyEnabled false\n            shrinkResources false\n            debuggable true\n        }\n    }|" "$APP_GRADLE"
          fi

          echo "=== Patched app build.gradle ==="
          sed -n '1,80p' "$APP_GRADLE"

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug


      - name: Rename APK to Univers Flow.apk
        run: |
          mkdir -p android/app/build/outputs/apk/debug/renamed
          cp android/app/build/outputs/apk/debug/app-debug.apk "android/app/build/outputs/apk/debug/renamed/Univers Flow.apk"
          ls -la "android/app/build/outputs/apk/debug/renamed/"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Univers Flow
          path: "android/app/build/outputs/apk/debug/renamed/Univers Flow.apk"
          retention-days: 30

