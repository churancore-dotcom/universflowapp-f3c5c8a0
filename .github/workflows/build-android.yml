name: Build Android APK

on:
  workflow_dispatch:  # Manual trigger from GitHub
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Use production Capacitor config
        run: |
          cp capacitor.config.prod.ts capacitor.config.ts

      - name: Add Android platform
        run: npx cap add android

      - name: Install google-services.json (Firebase / FCM)
        run: |
          cp android-config/google-services.json android/app/google-services.json
          echo "google-services.json installed:"
          ls -la android/app/google-services.json

      - name: Wire Firebase Gradle plugin
        run: |
          # 1) Add google-services classpath to project-level build.gradle
          PROJECT_GRADLE="android/build.gradle"
          if ! grep -q "com.google.gms:google-services" "$PROJECT_GRADLE"; then
            sed -i "s|classpath 'com.android.tools.build:gradle.*|&\n        classpath 'com.google.gms:google-services:4.4.2'|" "$PROJECT_GRADLE"
          fi

          # 2) Apply google-services plugin at the BOTTOM of app-level build.gradle
          APP_GRADLE="android/app/build.gradle"
          if ! grep -q "com.google.gms.google-services" "$APP_GRADLE"; then
            echo "" >> "$APP_GRADLE"
            echo "apply plugin: 'com.google.gms.google-services'" >> "$APP_GRADLE"
          fi

          # 3) Add Firebase Messaging dependency
          if ! grep -q "firebase-messaging" "$APP_GRADLE"; then
            sed -i "s|dependencies {|dependencies {\n    implementation platform('com.google.firebase:firebase-bom:33.5.1')\n    implementation 'com.google.firebase:firebase-messaging'|" "$APP_GRADLE"
          fi

          echo "=== project build.gradle ==="
          grep -n "google-services\|firebase" "$PROJECT_GRADLE" || true
          echo "=== app build.gradle ==="
          grep -n "google-services\|firebase" "$APP_GRADLE" || true

      - name: Integrate Android widgets
        run: |
          # Package must match capacitor.config.prod.ts appId
          PKG="app.lovable.id5acaae55bbc847a7bd32f3924d8ef986"
          PKG_PATH="app/lovable/id5acaae55bbc847a7bd32f3924d8ef986"

          # Create widget package directory
          mkdir -p "android/app/src/main/java/${PKG_PATH}/widgets"

          # Copy Java widget files, rewriting the package name to match new appId
          for f in android-widgets/java/*.java; do
            base=$(basename "$f")
            sed \
              -e "s/app\\.lovable\\.universflow\\.widgets/${PKG}.widgets/g" \
              -e "s/app\\.lovable\\.universflow/${PKG}/g" \
              "$f" > "android/app/src/main/java/${PKG_PATH}/widgets/${base}"
          done

          # Add R class import to all widget Java files
          for file in android/app/src/main/java/${PKG_PATH}/widgets/*.java; do
            sed -i "s|^package ${PKG}\\.widgets;|package ${PKG}.widgets;\\nimport ${PKG}.R;|" "$file"
          done

          # Copy drawable resources
          cp android-widgets/res/drawable/*.xml android/app/src/main/res/drawable/

          # Copy layout resources
          cp android-widgets/res/layout/*.xml android/app/src/main/res/layout/

          # Copy xml resources (widget info)
          mkdir -p android/app/src/main/res/xml
          cp android-widgets/res/xml/*.xml android/app/src/main/res/xml/

          # Merge string resources properly
          sed -i '/<\/resources>/d' android/app/src/main/res/values/strings.xml
          grep '<string name=' android-widgets/res/values/strings_widgets.xml >> android/app/src/main/res/values/strings.xml
          echo '</resources>' >> android/app/src/main/res/values/strings.xml

      - name: Update AndroidManifest.xml for widgets
        run: |
          # Add deep link intent filter to the main activity
          sed -i 's/<\/activity>/\
                  <intent-filter>\
                      <action android:name="android.intent.action.VIEW" \/>\
                      <category android:name="android.intent.category.DEFAULT" \/>\
                      <category android:name="android.intent.category.BROWSABLE" \/>\
                      <data android:scheme="universflow" \/>\
                  <\/intent-filter>\
              <\/activity>/g' android/app/src/main/AndroidManifest.xml

          # Add widget receivers and services before closing </application> tag
          sed -i 's/<\/application>/\
              <!-- Now Playing Widget -->\
              <receiver android:name=".widgets.NowPlayingWidget" android:exported="false">\
                  <intent-filter>\
                      <action android:name="android.appwidget.action.APPWIDGET_UPDATE" \/>\
                  <\/intent-filter>\
                  <meta-data android:name="android.appwidget.provider" android:resource="@xml\/now_playing_widget_info" \/>\
              <\/receiver>\
              <!-- Favorites Widget -->\
              <receiver android:name=".widgets.FavoritesWidget" android:exported="false">\
                  <intent-filter>\
                      <action android:name="android.appwidget.action.APPWIDGET_UPDATE" \/>\
                  <\/intent-filter>\
                  <meta-data android:name="android.appwidget.provider" android:resource="@xml\/favorites_widget_info" \/>\
              <\/receiver>\
              <!-- Quick Actions Widget -->\
              <receiver android:name=".widgets.QuickActionsWidget" android:exported="false">\
                  <intent-filter>\
                      <action android:name="android.appwidget.action.APPWIDGET_UPDATE" \/>\
                  <\/intent-filter>\
                  <meta-data android:name="android.appwidget.provider" android:resource="@xml\/quick_actions_widget_info" \/>\
              <\/receiver>\
              <!-- Recently Played Widget -->\
              <receiver android:name=".widgets.RecentlyPlayedWidget" android:exported="false">\
                  <intent-filter>\
                      <action android:name="android.appwidget.action.APPWIDGET_UPDATE" \/>\
                  <\/intent-filter>\
                  <meta-data android:name="android.appwidget.provider" android:resource="@xml\/recently_played_widget_info" \/>\
              <\/receiver>\
              <!-- Music Search Widget -->\
              <receiver android:name=".widgets.MusicSearchWidget" android:exported="false">\
                  <intent-filter>\
                      <action android:name="android.appwidget.action.APPWIDGET_UPDATE" \/>\
                  <\/intent-filter>\
                  <meta-data android:name="android.appwidget.provider" android:resource="@xml\/music_search_widget_info" \/>\
              <\/receiver>\
              <!-- Widget Update Service -->\
              <service android:name=".widgets.WidgetUpdateService" android:exported="false" \/>\
          <\/application>/g' android/app/src/main/AndroidManifest.xml

      - name: Register WidgetBridgePlugin in MainActivity
        run: |
          PKG="app.lovable.id5acaae55bbc847a7bd32f3924d8ef986"
          PKG_PATH="app/lovable/id5acaae55bbc847a7bd32f3924d8ef986"
          MAIN_ACTIVITY="android/app/src/main/java/${PKG_PATH}/MainActivity.java"

          # Add import for the WidgetBridgePlugin
          sed -i "s|import com.getcapacitor.BridgeActivity;|import com.getcapacitor.BridgeActivity;\\nimport ${PKG}.widgets.WidgetBridgePlugin;|" "$MAIN_ACTIVITY"

          # Override onCreate to register the plugin
          sed -i 's/public class MainActivity extends BridgeActivity {/public class MainActivity extends BridgeActivity {\n\n    @Override\n    public void onCreate(android.os.Bundle savedInstanceState) {\n        registerPlugin(WidgetBridgePlugin.class);\n        super.onCreate(savedInstanceState);\n    }\n/' "$MAIN_ACTIVITY"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: universflow-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
