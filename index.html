            <p>Universflow lets you stream unlimited music for free — no credit card, no hidden trial. Discover trending songs, new releases, top charts, and curated playlists across pop, hip-hop, Bollywood, rock, lo-fi, electronic, indie, and more. Save songs to your library, follow artists, and pick up listening across devices.</p>
          </section>
          <section>
            <h2>Download songs &amp; listen offline</h2>
            <p>Save your favourite tracks to your phone and play them with zero internet. Universflow's offline player works in airplane mode, on flights, in the metro, anywhere. Download whole playlists with one tap.</p>
          </section>

            <h3>Is Universflow really free?</h3>
            <p>Yes. Universflow is free to use with optional Premium upgrades. Create an account with email to start listening instantly.</p>
            <h3>Can I download songs to listen offline?</h3>
            <p>Yes. Tap the download icon on any song or playlist and it will be saved for offline playback inside the app.</p>
            <h3>Does Universflow work on Android and iPhone?</h3>
            <p>Universflow works in any modern browser and ships as a native Android app. iPhone users can install it as a home-screen web app.</p>
